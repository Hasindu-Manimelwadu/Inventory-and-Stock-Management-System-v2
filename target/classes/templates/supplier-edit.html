<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Edit Supplier</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="page-content" style="max-width:600px;">
    <div style="margin-bottom:25px;">
        <h1 class="page-title">Edit Supplier</h1>
        <p class="page-subtitle">Update existing supplier details</p>
    </div>
    <div class="sf-card" style="border-top:4px solid var(--accent-blue);">
        <form method="post" action="/suppliers/edit">
            <input type="hidden" name="supplierId" th:value="${supplier.supplierId}">
            <div class="form-group">
                <label class="sf-label">Supplier Type</label>
                <div style="display:flex;gap:25px;margin-top:5px;">
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:#e1e2e7;">
                        <input type="radio" name="type" value="Local" th:checked="${supplier.supplierType == 'Local'}"> Local Supplier
                    </label>
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:#e1e2e7;">
                        <input type="radio" name="type" value="Foreign" th:checked="${supplier.supplierType == 'Foreign'}"> Foreign Supplier
                    </label>
                </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
                <div class="form-group">
                    <label class="sf-label">Supplier Name</label>
                    <input type="text" name="name" class="sf-input" th:value="${supplier.name}" required>
                </div>
                <div class="form-group">
                    <label class="sf-label">Email Address</label>
                    <input type="email" name="email" class="sf-input" th:value="${supplier.email}" required>
                </div>
                <div class="form-group">
                    <label class="sf-label">Phone Number</label>
                    <input type="tel" name="phone" class="sf-input" th:value="${supplier.phone}" required>
                </div>
                <div class="form-group">
                    <label class="sf-label">Product Category</label>
                    <select name="productCategory" class="sf-input" required>
                        <option th:each="cat : ${ {'Electronics','Food & Beverages','Clothing','Stationery','Hardware','Pharmaceuticals','Other'} }"
                                th:value="${cat}" th:text="${cat}"
                                th:selected="${supplier.productCategory == cat}"></option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="sf-label">Address</label>
                <textarea name="address" class="sf-input" rows="2" th:text="${supplier.address}" required></textarea>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
                <div class="form-group">
                    <label class="sf-label">District / Country</label>
                    <input type="text" name="extraField" class="sf-input">
                </div>
                <div class="form-group">
                    <label class="sf-label">Status</label>
                    <select name="status" class="sf-input">
                        <option value="active" th:selected="${supplier.status == 'active'}">Active</option>
                        <option value="inactive" th:selected="${supplier.status == 'inactive'}">Inactive</option>
                    </select>
                </div>
            </div>
            <div style="display:flex;gap:12px;margin-top:10px;">
                <button type="submit" class="btn-sf btn-purple">Save Changes</button>
                <a href="/suppliers/list" class="btn-sf btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
