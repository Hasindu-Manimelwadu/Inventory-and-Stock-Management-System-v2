<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Supplier</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .navbar { background-color: #1a3c5e; }
        .form-card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 35px; max-width: 700px; margin: 0 auto; }
        .btn-primary { background-color: #1a3c5e; border-color: #1a3c5e; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark px-4 py-3 mb-4">
    <span class="navbar-brand fw-bold fs-5"><i class="bi bi-boxes me-2"></i>Inventory &amp; Stock Management</span>
</nav>
<div class="container py-2">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/suppliers/list">Suppliers</a></li>
            <li class="breadcrumb-item active">Edit Supplier</li>
        </ol>
    </nav>
    <div class="form-card">
        <h4><i class="bi bi-pencil-square me-2"></i>Edit Supplier Details</h4>
        <form method="post" action="/suppliers/edit">
            <input type="hidden" name="supplierId" th:value="${supplier.supplierId}">
            <div class="mb-4">
                <label class="form-label fw-semibold">Supplier Type</label>
                <div class="d-flex gap-4">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="type" value="Local"
                               th:checked="${supplier.supplierType == 'Local'}">
                        <label class="form-check-label">Local Supplier</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="type" value="Foreign"
                               th:checked="${supplier.supplierType == 'Foreign'}">
                        <label class="form-check-label">Foreign Supplier</label>
                    </div>
                </div>
            </div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Supplier Name</label>
                    <input type="text" name="name" class="form-control" th:value="${supplier.name}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Email Address</label>
                    <input type="email" name="email" class="form-control" th:value="${supplier.email}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Phone Number</label>
                    <input type="tel" name="phone" class="form-control" th:value="${supplier.phone}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Product Category</label>
                    <select name="productCategory" class="form-select" required>
                        <option th:each="cat : ${ {'Electronics','Food & Beverages','Clothing','Stationery','Hardware','Pharmaceuticals','Other'} }"
                                th:value="${cat}" th:text="${cat}"
                                th:selected="${supplier.productCategory == cat}"></option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Address</label>
                    <textarea name="address" class="form-control" rows="2" th:text="${supplier.address}" required></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">District / Country</label>
                    <input type="text" name="extraField" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Status</label>
                    <select name="status" class="form-select">
                        <option value="active" th:selected="${supplier.status == 'active'}">Active</option>
                        <option value="inactive" th:selected="${supplier.status == 'inactive'}">Inactive</option>
                    </select>
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary px-4"><i class="bi bi-save me-1"></i>Save Changes</button>
                <a href="/suppliers/list" class="btn btn-outline-secondary px-4">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
