<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Edit User</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="page-content" style="max-width:520px;">
    <div style="margin-bottom:25px;">
        <h1 class="page-title">Edit User</h1>
        <p class="page-subtitle">Modify existing user details</p>
    </div>
    <div class="sf-card" style="border-top:4px solid var(--accent-blue);">
        <form action="/updateUser" method="post">
            <input type="hidden" name="userId" th:value="${user.userId}">
            <div class="form-group">
                <label class="sf-label">User ID</label>
                <input type="text" class="sf-input" th:value="${user.userId}" disabled style="opacity:0.5;">
            </div>
            <div class="form-group">
                <label class="sf-label">Username</label>
                <input type="text" name="username" class="sf-input" th:value="${user.username}" required>
            </div>
            <div class="form-group">
                <label class="sf-label">Email Address</label>
                <input type="email" name="email" class="sf-input" th:value="${user.email}" required>
            </div>
            <div class="form-group">
                <label class="sf-label">Password</label>
                <input type="password" name="password" class="sf-input" required placeholder="Enter new password">
            </div>
            <div class="form-group">
                <label class="sf-label">Role</label>
                <select name="role" class="sf-input">
                    <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">ADMIN</option>
                    <option value="STAFF" th:selected="${user.role == 'STAFF'}">STAFF</option>
                </select>
            </div>
            <div style="display:flex;gap:12px;margin-top:10px;">
                <button type="submit" class="btn-sf btn-purple">Update User</button>
                <a href="/users" class="btn-sf btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
