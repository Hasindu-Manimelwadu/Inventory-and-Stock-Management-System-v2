<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register User</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f1117;
            color: #f5f5f5;
        }

        .sidebar {
            width: 230px;
            height: 100vh;
            background: #1b1f2a;
            position: fixed;
            padding: 25px 20px;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 40px;
        }

        .menu a {
            display: block;
            color: #aaa;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .menu a.active, .menu a:hover {
            background: #282d44;
            color: #7c6cff;
        }

        .main {
            margin-left: 270px;
            padding: 40px;
        }

        .card {
            background: #1b1f2a;
            padding: 30px;
            border-radius: 18px;
            max-width: 700px;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        label {
            display: block;
            margin-top: 18px;
            color: #aaa;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 13px;
            margin-top: 8px;
            border-radius: 10px;
            border: 1px solid #33384d;
            background: #11141d;
            color: white;
        }

        button {
            margin-top: 25px;
            padding: 13px 22px;
            border: none;
            border-radius: 12px;
            background: #7c6cff;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .back {
            color: #aaa;
            margin-left: 15px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">📦 StockFlow<br><small>Inventory System</small></div>
    <div class="menu">
        <a href="/users">User List</a>
        <a href="/register" class="active">Register User</a>
        <a href="/login">Login</a>
    </div>
</div>

<div class="main">
    <h1>Register User</h1>
    <p>Create admin and staff accounts</p>

    <div class="card">
        <form action="/register" method="post">

            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required>

            <label>Email</label>
            <input type="email" name="email" placeholder="Enter email" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>

            <label>Role</label>
            <select name="role" required>
                <option value="">Select role</option>
                <option value="ADMIN">Admin</option>
                <option value="STAFF">Staff</option>
            </select>

            <button type="submit">+ Register User</button>
            <a href="/users" class="back">Cancel</a>
        </form>
    </div>
</div>

</body>
</html>
