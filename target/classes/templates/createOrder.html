<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Create Order</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <style>
        .items-table { width:100%; border-collapse:collapse; margin-bottom:15px; }
        .items-table th { background:#2b304a; color:var(--text-muted); padding:10px 12px; font-size:12px; text-transform:uppercase; text-align:left; }
        .items-table td { padding:8px 12px; border-bottom:1px solid var(--border); }
        .items-table input { background:var(--bg-main); border:1px solid var(--border); color:#fff; padding:8px 10px; border-radius:6px; width:100%; font-family:'Inter',sans-serif; }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="page-content" style="max-width:750px;">
    <div style="margin-bottom:25px;">
        <h1 class="page-title">Create Purchase Order</h1>
        <p class="page-subtitle">Place a new order with a supplier</p>
    </div>
    <div class="sf-card" style="border-top:4px solid var(--accent-red);">
        <form action="/createOrder" method="post">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
                <div class="form-group">
                    <label class="sf-label">Supplier ID</label>
                    <input type="text" name="supplierId" class="sf-input" required placeholder="e.g. SUP001">
                </div>
                <div class="form-group">
                    <label class="sf-label">Supplier Name</label>
                    <input type="text" name="supplierName" class="sf-input" required placeholder="e.g. Perera Traders">
                </div>
                <div class="form-group">
                    <label class="sf-label">Expected Date</label>
                    <input type="date" name="expectedDate" class="sf-input" required>
                </div>
                <div class="form-group">
                    <label class="sf-label">Created By</label>
                    <input type="text" name="createdBy" class="sf-input" required placeholder="Your name">
                </div>
            </div>
            <div class="form-group">
                <label class="sf-label">Notes</label>
                <textarea name="notes" class="sf-input" rows="2" placeholder="Additional notes..."></textarea>
            </div>
            <div style="margin:20px 0 10px;display:flex;justify-content:space-between;align-items:center;">
                <label class="sf-label" style="margin:0;">Order Items</label>
                <button type="button" onclick="addRow()" class="btn-sf btn-secondary btn-sm">+ Add Item</button>
            </div>
            <table class="items-table" id="itemsTable">
                <thead><tr><th>Item Name</th><th>Quantity</th><th>Unit Price</th><th></th></tr></thead>
                <tbody id="itemsBody">
                <tr>
                    <td><input type="text" name="itemName[]" required placeholder="Item name"></td>
                    <td><input type="number" name="quantity[]" required placeholder="Qty" min="1"></td>
                    <td><input type="number" name="unitPrice[]" required placeholder="0.00" step="0.01"></td>
                    <td></td>
                </tr>
                </tbody>
            </table>
            <div style="display:flex;gap:12px;margin-top:20px;">
                <button type="submit" class="btn-sf btn-purple">Submit Order</button>
                <a href="/orders" class="btn-sf btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
<script>
    function addRow() {
        const tbody = document.getElementById('itemsBody');
        const row = `<tr>
            <td><input type="text" name="itemName[]" required placeholder="Item name"></td>
            <td><input type="number" name="quantity[]" required placeholder="Qty" min="1"></td>
            <td><input type="number" name="unitPrice[]" required placeholder="0.00" step="0.01"></td>
            <td><button type="button" onclick="this.closest('tr').remove()" style="background:transparent;border:none;color:var(--accent-red);cursor:pointer;font-size:18px;">✕</button></td>
        </tr>`;
        tbody.insertAdjacentHTML('beforeend', row);
    }
</script>
</body>
</html>
