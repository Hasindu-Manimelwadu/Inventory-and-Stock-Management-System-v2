<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Update Order</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="page-content" style="max-width:520px;">
    <div style="margin-bottom:25px;">
        <h1 class="page-title">Update Order Status</h1>
        <p class="page-subtitle">Change the status of a purchase order</p>
    </div>
    <div class="sf-card" style="border-top:4px solid var(--accent-orange);">
        <form action="/updateOrder" method="post">
            <input type="hidden" name="poId" th:value="${po.poId}">
            <div class="form-group">
                <label class="sf-label">Order ID</label>
                <input type="text" class="sf-input" th:value="${po.poId}" disabled style="opacity:0.5;">
            </div>
            <div class="form-group">
                <label class="sf-label">Supplier</label>
                <input type="text" class="sf-input" th:value="${po.supplierName}" disabled style="opacity:0.5;">
            </div>
            <div class="form-group">
                <label class="sf-label">Current Status</label>
                <span th:class="${po.status == 'RECEIVED' ? 'badge badge-green' : (po.status == 'PENDING' ? 'badge badge-orange' : 'badge badge-red')}"
                      th:text="${po.status}" style="font-size:14px;padding:8px 14px;"></span>
            </div>
            <div class="form-group">
                <label class="sf-label">New Status</label>
                <select name="newStatus" class="sf-input">
                    <option value="PENDING" th:selected="${po.status == 'PENDING'}">PENDING</option>
                    <option value="RECEIVED" th:selected="${po.status == 'RECEIVED'}">RECEIVED</option>
                    <option value="CANCELLED" th:selected="${po.status == 'CANCELLED'}">CANCELLED</option>
                </select>
            </div>
            <div style="display:flex;gap:12px;margin-top:10px;">
                <button type="submit" class="btn-sf btn-purple">Update Status</button>
                <a href="/orders" class="btn-sf btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
