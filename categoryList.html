<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Categories</title>
    <style>
        :root {
            --bg-main: #0f111a;
            --bg-sidebar: #161925;
            --bg-card: #1f2335;
            --text-main: #fff;
            --text-muted: #787c99;
            --accent-purple: #7a5af8;
            --accent-green: #10b981;
            --accent-blue: #00bfff;
            --accent-red: #ff4a5a;
            --border: #2b304a;
        }
        body { font-family: 'Inter', sans-serif; margin:0; display:flex; background:var(--bg-main); color:var(--text-main); min-height:100vh; }
        .sidebar { width:240px; background:var(--bg-sidebar); border-right:1px solid var(--border); padding:25px 0; }
        .logo { font-size:22px; font-weight:bold; padding:0 25px 25px; border-bottom:1px solid var(--border); color:#fff; display:flex; gap:10px; }
        .logo span { font-size:11px; color:var(--text-muted); display:block; letter-spacing:1px; }
        .menu-lbl { font-size:11px; color:var(--text-muted); padding:25px 25px 10px; text-transform:uppercase; font-weight:bold; }
        .sidebar a { display:block; color:var(--text-muted); padding:14px 25px; text-decoration:none; font-size:14px; }
        .sidebar a.active { background:rgba(122,90,248,0.12); color:var(--accent-purple); border-left:4px solid var(--accent-purple); font-weight:bold;}
        .main { flex-grow:1; padding:40px; }
        .top-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:35px; }
        .top-row h1 { margin:0; font-size:30px; letter-spacing:-0.5px; }
        .top-row p { margin:5px 0 0; color:var(--text-muted); font-size:14px; }
        .btn-add { background:var(--accent-purple); color:#fff; padding:12px 22px; border-radius:8px; text-decoration:none; font-weight:bold; font-size:14px; }
        .stats { display:flex; gap:20px; margin-bottom:35px; }
        .card { background:var(--bg-card); padding:22px; border-radius:12px; flex:1; border-top:4px solid var(--accent-purple); }
        .card h3 { margin:0; font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; }
        .card p { margin:12px 0 0; font-size:32px; font-weight:bold; color:var(--accent-purple); }
        table { width:100%; border-collapse:collapse; background:var(--bg-card); border-radius:12px; overflow:hidden; }
        th { background:#fff; color:#000; padding:16px 20px; font-size:12px; font-weight:bold; text-transform:uppercase; text-align:left; }
        td { padding:18px 20px; border-bottom:1px solid var(--border); font-size:14px; color:#e1e2e7; }
        .badge { background:rgba(122,90,248,0.15); color:var(--accent-purple); padding:4px 10px; border-radius:6px; font-size:12px; font-weight:bold; }
        .badge.sub { background:rgba(0,191,255,0.15); color:var(--accent-blue); }
        .act-link { color:var(--accent-blue); text-decoration:none; font-weight:bold; margin-right:15px; font-size:13px;}
        .act-link.del { color:var(--accent-red); }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="logo">📦 StockFlow <span>INVENTORY SYSTEM</span></div>
    <div class="menu-lbl">Main Menu</div>
    <a href="/products">Products</a>
    <a href="/categories" class="active">Categories</a>
    <a href="/orders">Orders</a>
    <a href="/suppliers">Suppliers</a>
</div>
<div class="main">
    <div class="top-row">
        <div>
            <h1>Categories</h1>
            <p>Track and structure your inventory catalogs hierarchically</p>
        </div>
        <a th:href="@{/categories/create}" class="btn-add">+ Add Category</a>
    </div>
    <div class="stats">
        <div class="card"><h3 style="color:var(--text-muted)">Total Categories</h3><p th:text="${totalCount}">0</p></div>
        <div class="card" style="border-top-color:var(--accent-green)"><h3 style="color:var(--text-muted)">Main Classes</h3><p th:text="${mainCount}" style="color:var(--accent-green)">0</p></div>
        <div class="card" style="border-top-color:var(--accent-blue)"><h3 style="color:var(--text-muted)">Sub Divisions</h3><p th:text="${subCount}" style="color:var(--accent-blue)">0</p></div>
    </div>
    <table>
        <thead>
        <tr><th>ID</th><th>Category Stack (Polymorphic)</th><th>Description</th><th>Type Badge</th><th>Action Controls</th></tr>
        </thead>
        <tbody>
        <tr th:each="c : ${categories}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.getDisplayFormat()}" style="font-weight:bold;"></td>
            <td th:text="${c.description}" style="color:var(--text-muted);"></td>
            <td>
                <span th:class="${c.categoryType == 'MAIN' ? 'badge' : 'badge sub'}" th:text="${c.categoryType}"></span>
            </td>
            <td>
                <a th:href="@{/categories/edit(id=${c.id})}" class="act-link">Edit</a>
                <a th:href="@{/categories/delete(id=${c.id})}" class="act-link del" onclick="return confirm('Drop this structural category permanently?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
