<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Adjust Stock</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="page-content" style="max-width:520px;">
    <div style="margin-bottom:25px;">
        <h1 class="page-title">Adjust Stock</h1>
        <p class="page-subtitle">Update an existing stock transaction</p>
    </div>
    <div class="sf-card" style="border-top:4px solid var(--accent-blue);">
        <form action="/stock/update" method="post">
            <input type="hidden" name="transactionId" th:value="${transaction.transactionId}">
            <div class="form-group">
                <label class="sf-label">Transaction ID</label>
                <input type="text" class="sf-input" th:value="${transaction.transactionId}" disabled style="opacity:0.5;">
            </div>
            <div class="form-group">
                <label class="sf-label">Product</label>
                <input type="text" class="sf-input" th:value="${transaction.productName}" disabled style="opacity:0.5;">
            </div>
            <div class="form-group">
                <label class="sf-label">New Quantity</label>
                <input type="number" name="quantity" class="sf-input" th:value="${transaction.quantity}" required>
            </div>
            <div class="form-group">
                <label class="sf-label">Notes</label>
                <textarea name="notes" class="sf-input" rows="2" th:text="${transaction.notes}"></textarea>
            </div>
            <div style="display:flex;gap:12px;margin-top:10px;">
                <button type="submit" class="btn-sf btn-purple">Update Entry</button>
                <a href="/stock/list" class="btn-sf btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
