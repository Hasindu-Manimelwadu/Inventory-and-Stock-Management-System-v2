<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Add Category</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="page-content" style="max-width:520px;">
    <div style="margin-bottom:25px;">
        <h1 class="page-title">Create Category</h1>
        <p class="page-subtitle">Add a new main or sub-category to the system</p>
    </div>
    <div class="sf-card" style="border-top:4px solid var(--accent-purple);">
        <form th:action="@{/categories/create}" method="post">
            <div class="form-group">
                <label class="sf-label">Category Name</label>
                <input type="text" name="categoryName" class="sf-input" required placeholder="Enter category name">
            </div>
            <div class="form-group">
                <label class="sf-label">Description</label>
                <textarea name="description" class="sf-input" rows="3" required placeholder="Enter description"></textarea>
            </div>
            <div class="form-group">
                <label class="sf-label">Category Type</label>
                <select name="categoryType" id="typeSelect" class="sf-input" onchange="toggleParent()">
                    <option value="MAIN">MAIN - Top Level</option>
                    <option value="SUB">SUB - Nested Level</option>
                </select>
            </div>
            <div class="form-group" id="parentGroup" style="display:none;">
                <label class="sf-label">Parent Category</label>
                <select name="parentCategoryId" class="sf-input">
                    <option value="">-- Select Parent --</option>
                    <option th:each="m : ${mainCategories}" th:value="${m.id}" th:text="${m.categoryName}"></option>
                </select>
            </div>
            <div style="display:flex;gap:12px;margin-top:10px;">
                <button type="submit" class="btn-sf btn-purple">Save Category</button>
                <a th:href="@{/categories}" class="btn-sf btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
<script>
    function toggleParent() {
        const type = document.getElementById('typeSelect').value;
        document.getElementById('parentGroup').style.display = type === 'SUB' ? 'block' : 'none';
    }
</script>
</body>
</html>
