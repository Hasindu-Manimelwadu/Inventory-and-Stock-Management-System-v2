<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update User</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f1117;
            color: #f5f5f5;
        }

        .main {
            padding: 50px;
        }

        .card {
            background: #1b1f2a;
            padding: 30px;
            border-radius: 18px;
            max-width: 650px;
            margin: auto;
        }

        label {
            display: block;
            margin-top: 18px;
            color: #aaa;
        }

        input, select {
            width: 100%;
            padding: 13px;
            margin-top: 8px;
            border-radius: 10px;
            border: 1px solid #33384d;
            background: #11141d;
            color: white;
        }

        button {
            margin-top: 25px;
            padding: 13px 22px;
            border: none;
            border-radius: 12px;
            background: #ffc107;
            font-weight: bold;
            cursor: pointer;
        }

        a {
            color: #aaa;
            margin-left: 15px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="main">
    <div class="card">
        <h1>Update User</h1>

        <form action="/updateUser" method="post">

            <label>User ID</label>
            <input type="text" name="userId" th:value="${user.userId}" readonly>

            <label>Username</label>
            <input type="text" name="username" th:value="${user.username}" required>

            <label>Email</label>
            <input type="email" name="email" th:value="${user.email}" required>

            <label>Password</label>
            <input type="text" name="password" th:value="${user.password}" required>

            <label>Role</label>
            <select name="role" required>
                <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">Admin</option>
                <option value="STAFF" th:selected="${user.role == 'STAFF'}">Staff</option>
            </select>

            <button type="submit">Update User</button>
            <a href="/users">Back</a>
        </form>
    </div>
</div>

</body>
</html>
