<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Product Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0f1117;
            color: #f5f6fa;
            font-family: Arial, sans-serif;
        }

        .sidebar {
            width: 240px;
            height: 100vh;
            background-color: #191d29;
            position: fixed;
            left: 0;
            top: 0;
            padding: 30px 20px;
            border-right: 1px solid #242938;
        }

        .brand {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .brand-sub {
            font-size: 11px;
            color: #8b91a7;
            letter-spacing: 1px;
        }

        .menu-title {
            margin-top: 45px;
            font-size: 12px;
            color: #8b91a7;
            letter-spacing: 1.5px;
        }

        .menu-link {
            display: block;
            padding: 13px 15px;
            border-radius: 10px;
            color: #aeb4ca;
            text-decoration: none;
            margin-top: 10px;
        }

        .menu-link.active,
        .menu-link:hover {
            background-color: #2a2559;
            color: #8b7cff;
        }

        .main-content {
            margin-left: 240px;
            padding: 35px 40px;
        }

        .page-title {
            font-size: 30px;
            font-weight: 800;
        }

        .page-subtitle {
            color: #8b91a7;
            font-size: 14px;
        }

        .form-card {
            background-color: #1b1f2b;
            border-radius: 16px;
            border: 1px solid #262c3f;
            box-shadow: 0 12px 30px rgba(0,0,0,0.25);
            max-width: 900px;
            margin-top: 30px;
        }

        .form-card-header {
            background-color: #252b44;
            padding: 22px 25px;
            border-radius: 16px 16px 0 0;
            border-top: 4px solid #7c6cff;
        }

        .form-card-body {
            padding: 28px;
        }

        label {
            color: #c4c9dc;
            font-weight: 600;
            font-size: 14px;
        }

        .dark-input {
            background-color: #121621;
            border: 1px solid #2f3650;
            color: white;
            border-radius: 10px;
            padding: 12px;
        }

        .dark-input::placeholder {
            color: #777f99;
        }

        .dark-input:focus {
            background-color: #121621;
            color: white;
            border-color: #7c6cff;
            box-shadow: 0 0 0 0.15rem rgba(124, 108, 255, 0.25);
        }

        .btn-purple {
            background: #7c6cff;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 11px 24px;
            box-shadow: 0 0 18px rgba(124, 108, 255, 0.4);
        }

        .btn-purple:hover {
            background: #6a5af9;
            color: white;
        }

        .section-title {
            color: #8b91a7;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 18px;
            font-weight: 700;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <div class="brand">📦 StockFlow</div>
    <div class="brand-sub">INVENTORY SYSTEM</div>

    <div class="menu-title">MAIN MENU</div>

    <a href="/products" class="menu-link">▣ Products</a>
    <a href="/products/new" class="menu-link active">＋ Add Product</a>

    <div style="position:absolute; bottom:25px; left:20px; right:20px;">
        <div class="p-3 rounded" style="background:#222842;">
            <strong>Product Management</strong>
            <div style="font-size:12px; color:#8b91a7;">Add or update items</div>
        </div>
    </div>
</div>

<div class="main-content">

    <div class="d-flex justify-content-between align-items-start">
        <div>
            <div class="page-title" th:text="${pageTitle}">Add Product</div>
            <div class="page-subtitle">Enter product details for inventory tracking</div>
        </div>

        <a th:href="@{/products}" class="btn btn-outline-light">Back to Products</a>
    </div>

    <div class="form-card">
        <div class="form-card-header">
            <h4 class="mb-0">📦 Product Information</h4>
        </div>

        <div class="form-card-body">
            <form th:action="@{/products/save}" th:object="${product}" method="post">

                <input type="hidden" th:field="*{id}">

                <div class="section-title">Basic Details</div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Product Name</label>
                        <input type="text"
                               th:field="*{name}"
                               class="form-control dark-input"
                               placeholder="e.g. Rice"
                               required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">SKU</label>
                        <input type="text"
                               th:field="*{sku}"
                               class="form-control dark-input"
                               placeholder="e.g. R001"
                               required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Category</label>
                        <input type="text"
                               th:field="*{category}"
                               class="form-control dark-input"
                               placeholder="e.g. Grocery"
                               required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Product Type</label>
                        <select th:field="*{type}" class="form-select dark-input">
                            <option value="Perishable">Perishable</option>
                            <option value="Non-Perishable">Non-Perishable</option>
                        </select>
                    </div>
                </div>

                <hr style="border-color:#2f3650; margin:28px 0;">

                <div class="section-title">Stock and Price Details</div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Price (Rs.)</label>
                        <input type="number"
                               step="0.01"
                               th:field="*{price}"
                               class="form-control dark-input"
                               placeholder="0.00"
                               required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Quantity</label>
                        <input type="number"
                               th:field="*{quantity}"
                               class="form-control dark-input"
                               placeholder="0"
                               required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Expiry Date</label>
                    <input type="text"
                           th:field="*{expiryDate}"
                           class="form-control dark-input"
                           placeholder="YYYY-MM-DD">
                </div>

                <div class="mb-4">
                    <label class="form-label">Description</label>
                    <textarea th:field="*{description}"
                              class="form-control dark-input"
                              rows="3"
                              placeholder="Short product description..."></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-purple">
                        Save Product
                    </button>

                    <a th:href="@{/products}" class="btn btn-outline-secondary px-4">
                        Cancel
                    </a>
                </div>

            </form>
        </div>
    </div>

</div>

</body>
</html>
