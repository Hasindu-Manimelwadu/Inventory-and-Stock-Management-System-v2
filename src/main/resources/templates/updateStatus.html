<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Order Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2e3250;
            --accent: #6c63ff;
            --accent2: #00d4aa;
            --danger: #ff4d6d;
            --warning: #ffbe0b;
            --text: #e8eaf6;
            --text-muted: #7b82a8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar { position: fixed; left: 0; top: 0; width: 240px; height: 100vh; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 28px 20px; z-index: 100; }
        .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
        .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .logo-text { font-size: 14px; font-weight: 700; line-height: 1.2; }
        .logo-text span { display: block; font-size: 10px; font-weight: 400; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
        .nav-label { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; padding-left: 12px; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; text-decoration: none; color: var(--text-muted); font-size: 13.5px; font-weight: 500; transition: all 0.2s; margin-bottom: 4px; }
        .nav-item:hover { background: var(--surface2); color: var(--text); }
        .sidebar-footer { margin-top: auto; padding: 16px 12px; background: var(--surface2); border-radius: 12px; font-size: 12px; color: var(--text-muted); }

        /* Main */
        .main {
            margin-left: 240px;
            padding: 32px;
            width: calc(100% - 240px);
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
        .breadcrumb a { color: var(--text-muted); text-decoration: none; }
        .page-title { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 32px; }

        /* PO Info Banner */
        .po-banner {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .po-field label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
            display: block;
            margin-bottom: 6px;
        }

        .po-field .value {
            font-size: 14px;
            font-weight: 600;
        }

        .po-id-display {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: var(--accent);
            background: rgba(108,99,255,0.1);
            padding: 4px 10px;
            border-radius: 8px;
            display: inline-block;
        }

        /* Status selector */
        .update-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            max-width: 600px;
        }

        .update-card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .update-card-body { padding: 24px; }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 24px;
        }

        .status-option {
            position: relative;
        }

        .status-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
        }

        .status-option label {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            background: var(--surface2);
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            font-weight: 600;
        }

        .status-option label:hover {
            border-color: var(--accent);
            background: rgba(108,99,255,0.05);
        }

        .status-option input:checked + label {
            border-color: var(--accent);
            background: rgba(108,99,255,0.1);
            color: var(--text);
        }

        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot-approved  { background: #6c63ff; }
        .dot-rejected  { background: #7b82a8; }
        .dot-ordered   { background: #38bdf8; }
        .dot-partial   { background: #7fffd4; }
        .dot-received  { background: #00d4aa; }
        .dot-cancelled { background: #ff4d6d; }

        /* Hidden select for form submission */
        #newStatusHidden { display: none; }

        .btn-submit {
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--accent), #8b7ff5);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(108,99,255,0.35);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(108,99,255,0.45);
        }

        .btn-cancel {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 14px 20px;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            margin-left: 10px;
            transition: all 0.2s;
        }

        .btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }
    </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
    <div class="logo">
        <div class="logo-icon">📦</div>
        <div class="logo-text">StockFlow<span>Inventory System</span></div>
    </div>
    <div class="nav-label">Main Menu</div>
    <a href="/orders" class="nav-item"><i class="bi bi-receipt"></i> Purchase Orders</a>
    <a href="/createOrder" class="nav-item"><i class="bi bi-plus-circle"></i> New Order</a>
    <div class="sidebar-footer">
        <div style="font-weight:600; color:var(--text); margin-bottom:4px;">Update Status</div>
        <div>Change order lifecycle stage</div>
    </div>
</aside>

<main class="main">
    <div class="breadcrumb">
        <a href="/orders">Purchase Orders</a>
        <i class="bi bi-chevron-right" style="font-size:10px;"></i>
        <span th:text="${po != null ? po.orderId : 'Update'}">Update</span>
    </div>
    <div class="page-title">Update Order Status</div>

    <!-- PO Info Banner -->
    <div class="po-banner" th:if="${po != null}">
        <div class="po-field">
            <label>PO ID</label>
            <div class="value">
                <span class="po-id-display" th:text="${po.orderId}"></span>
            </div>
        </div>
        <div class="po-field">
            <label>Supplier</label>
            <div class="value" th:text="${po.supplierName}"></div>
        </div>
        <div class="po-field">
            <label>Order Date</label>
            <div class="value" th:text="${po.orderDate}"></div>
        </div>
        <div class="po-field">
            <label>Current Status</label>
            <div class="value" th:text="${po.status}"></div>
        </div>
    </div>

    <!-- Update Form -->
    <div class="update-card">
        <div class="update-card-header">
            <span style="font-size:20px;">🔄</span>
            <div>
                <div style="font-size:14px; font-weight:700;">Select New Status</div>
                <div style="font-size:12px; color:var(--text-muted);">Choose the next stage for this order</div>
            </div>
        </div>
        <div class="update-card-body">
            <form action="/updateOrder" method="POST">
                <input type="hidden" name="poId"
                       th:value="${po != null ? po.orderId : ''}">
                <input type="hidden" name="newStatus" id="newStatusHidden">

                <div class="status-grid">
                    <div class="status-option">
                        <input type="radio" name="statusRadio" id="s1" value="APPROVED" onchange="setStatus(this)">
                        <label for="s1">
                            <span class="status-dot dot-approved"></span> Approved
                        </label>
                    </div>
                    <div class="status-option">
                        <input type="radio" name="statusRadio" id="s2" value="REJECTED" onchange="setStatus(this)">
                        <label for="s2">
                            <span class="status-dot dot-rejected"></span> Rejected
                        </label>
                    </div>
                    <div class="status-option">
                        <input type="radio" name="statusRadio" id="s3" value="ORDERED" onchange="setStatus(this)">
                        <label for="s3">
                            <span class="status-dot dot-ordered"></span> Ordered
                        </label>
                    </div>
                    <div class="status-option">
                        <input type="radio" name="statusRadio" id="s4" value="PARTIALLY_RECEIVED" onchange="setStatus(this)">
                        <label for="s4">
                            <span class="status-dot dot-partial"></span> Partially Received
                        </label>
                    </div>
                    <div class="status-option">
                        <input type="radio" name="statusRadio" id="s5" value="RECEIVED" onchange="setStatus(this)">
                        <label for="s5">
                            <span class="status-dot dot-received"></span> Fully Received
                        </label>
                    </div>
                    <div class="status-option">
                        <input type="radio" name="statusRadio" id="s6" value="CANCELLED" onchange="setStatus(this)">
                        <label for="s6">
                            <span class="status-dot dot-cancelled"></span> Cancelled
                        </label>
                    </div>
                </div>

                <div style="display:flex; align-items:center;">
                    <button type="submit" class="btn-submit" onclick="return validateStatus()">
                        <i class="bi bi-check-circle"></i> Update Status
                    </button>
                    <a href="/orders" class="btn-cancel">
                        <i class="bi bi-arrow-left"></i> Back
                    </a>
                </div>
            </form>
        </div>
    </div>
</main>

<script>
    function setStatus(radio) {
        document.getElementById('newStatusHidden').value = radio.value;
    }

    function validateStatus() {
        if (!document.getElementById('newStatusHidden').value) {
            alert('Please select a status first.');
            return false;
        }
        return true;
    }
</script>
</body>
</html>
