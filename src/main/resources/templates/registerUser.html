<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Register User</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="page-content" style="max-width:520px;">
    <div style="margin-bottom:25px;">
        <h1 class="page-title">Register User</h1>
        <p class="page-subtitle">Add a new administrator or staff member</p>
    </div>
    <div class="sf-card" style="border-top:4px solid var(--accent-purple);">
        <form action="/register" method="post">
            <div class="form-group">
                <label class="sf-label">Username</label>
                <input type="text" name="username" class="sf-input" required placeholder="Enter username">
            </div>
            <div class="form-group">
                <label class="sf-label">Email Address</label>
                <input type="email" name="email" class="sf-input" required placeholder="Enter email">
            </div>
            <div class="form-group">
                <label class="sf-label">Password</label>
                <input type="password" name="password" class="sf-input" required placeholder="Enter password">
            </div>
            <div class="form-group">
                <label class="sf-label">Role</label>
                <select name="role" class="sf-input">
                    <option value="ADMIN">ADMIN</option>
                    <option value="STAFF">STAFF</option>
                </select>
            </div>
            <div style="display:flex;gap:12px;margin-top:10px;">
                <button type="submit" class="btn-sf btn-purple">Register User</button>
                <a href="/users" class="btn-sf btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
