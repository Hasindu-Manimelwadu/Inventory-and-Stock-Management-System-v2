<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Login</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <style>
        .login-wrapper { min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .login-box { width:100%; max-width:440px; }
        .login-logo { font-size:28px; font-weight:800; text-align:center; margin-bottom:5px; }
        .login-sub { text-align:center; color:var(--text-muted); font-size:13px; margin-bottom:30px; }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-box">
        <div class="login-logo">📦 StockFlow</div>
        <div class="login-sub">Inventory Management System</div>
        <div class="sf-card" style="border-top:4px solid var(--accent-purple);">
            <div th:if="${error}" class="alert-danger" th:text="${error}"></div>
            <form action="/login" method="post">
                <div class="form-group">
                    <label class="sf-label">Username</label>
                    <input type="text" name="username" class="sf-input" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label class="sf-label">Password</label>
                    <input type="password" name="password" class="sf-input" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn-sf btn-purple" style="width:100%;margin-top:10px;padding:14px;">Login</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
