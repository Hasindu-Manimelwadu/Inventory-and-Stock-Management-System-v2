<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Login</title>
    <style>
        body {
            background: #0f1117;
            color: white;
            font-family: Arial, sans-serif;
        }

        .card {
            background: #1b1f2a;
            width: 400px;
            margin: 100px auto;
            padding: 35px;
            border-radius: 20px;
        }

        input {
            width: 100%;
            padding: 13px;
            margin-top: 12px;
            border-radius: 10px;
            border: 1px solid #33384d;
            background: #11141d;
            color: white;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 13px;
            border: none;
            border-radius: 12px;
            background: #7c6cff;
            color: white;
            font-weight: bold;
        }

        .error {
            color: #ff5c7a;
        }

        a {
            color: #aaa;
            display: block;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Login</h1>
    <p>Access StockFlow system</p>

    <p class="error" th:text="${error}"></p>

    <form action="/login" method="post">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <a href="/register">Create new account</a>
</div>

</body>
</html>
