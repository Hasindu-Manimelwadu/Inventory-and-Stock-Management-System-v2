<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="navbar">

    <!-- Top Navbar -->
    <nav style="
        background-color:#161925;
        border-bottom:1px solid #2b304a;
        padding:15px 25px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        position:sticky;
        top:0;
        z-index:1000;">

        <!-- Logo -->
        <div style="display:flex;align-items:center;gap:12px;">
            <span style="font-size:22px;font-weight:800;color:#fff;">📦 StockFlow</span>
            <span style="font-size:10px;color:#787c99;letter-spacing:1px;text-transform:uppercase;">Inventory System</span>
        </div>

        <!-- Hamburger Button -->
        <button onclick="toggleMenu()" style="
            background:rgba(122,90,248,0.15);
            border:1px solid #7a5af8;
            border-radius:8px;
            padding:8px 12px;
            cursor:pointer;
            color:#7a5af8;
            font-size:20px;
            line-height:1;">
            ☰
        </button>
    </nav>

    <!-- Slide-out Menu Overlay -->
    <div id="menuOverlay" onclick="toggleMenu()" style="
        display:none;
        position:fixed;
        top:0; left:0;
        width:100%; height:100%;
        background:rgba(0,0,0,0.6);
        z-index:1001;">
    </div>

    <!-- Slide-out Menu Panel -->
    <div id="menuPanel" style="
        position:fixed;
        top:0; right:-320px;
        width:300px; height:100%;
        background:#161925;
        border-left:1px solid #2b304a;
        z-index:1002;
        transition:right 0.3s ease;
        padding:25px 0;
        overflow-y:auto;">

        <!-- Menu Header -->
        <div style="padding:0 25px 20px;border-bottom:1px solid #2b304a;display:flex;justify-content:space-between;align-items:center;">
            <div>
                <div style="font-size:18px;font-weight:800;color:#fff;">Navigation</div>
                <div style="font-size:11px;color:#787c99;margin-top:3px;">Select a module</div>
            </div>
            <button onclick="toggleMenu()" style="
                background:transparent;
                border:none;
                color:#787c99;
                font-size:22px;
                cursor:pointer;">✕</button>
        </div>

        <!-- Menu Items -->
        <div style="padding:15px 0;">

            <div style="padding:8px 25px;font-size:11px;color:#787c99;text-transform:uppercase;letter-spacing:1px;font-weight:bold;">
                Main Menu
            </div>

            <a href="/" style="
                display:flex;align-items:center;gap:14px;
                padding:14px 25px;
                color:#c0c4de;
                text-decoration:none;
                font-size:14px;
                font-weight:500;
                transition:background 0.2s;"
               onmouseover="this.style.background='rgba(122,90,248,0.1)';this.style.color='#7a5af8';"
               onmouseout="this.style.background='transparent';this.style.color='#c0c4de';">
                <span style="font-size:20px;">🏠</span> Dashboard
            </a>

            <a href="/users" style="
                display:flex;align-items:center;gap:14px;
                padding:14px 25px;
                color:#c0c4de;
                text-decoration:none;
                font-size:14px;
                font-weight:500;
                transition:background 0.2s;"
               onmouseover="this.style.background='rgba(122,90,248,0.1)';this.style.color='#7a5af8';"
               onmouseout="this.style.background='transparent';this.style.color='#c0c4de';">
                <span style="font-size:20px;">👤</span> User Management
            </a>

            <a href="/categories" style="
                display:flex;align-items:center;gap:14px;
                padding:14px 25px;
                color:#c0c4de;
                text-decoration:none;
                font-size:14px;
                font-weight:500;"
               onmouseover="this.style.background='rgba(122,90,248,0.1)';this.style.color='#7a5af8';"
               onmouseout="this.style.background='transparent';this.style.color='#c0c4de';">
                <span style="font-size:20px;">🗂️</span> Category Management
            </a>

            <a href="/products" style="
                display:flex;align-items:center;gap:14px;
                padding:14px 25px;
                color:#c0c4de;
                text-decoration:none;
                font-size:14px;
                font-weight:500;"
               onmouseover="this.style.background='rgba(122,90,248,0.1)';this.style.color='#7a5af8';"
               onmouseout="this.style.background='transparent';this.style.color='#c0c4de';">
                <span style="font-size:20px;">📦</span> Product Management
            </a>

            <a href="/stock/dashboard" style="
                display:flex;align-items:center;gap:14px;
                padding:14px 25px;
                color:#c0c4de;
                text-decoration:none;
                font-size:14px;
                font-weight:500;"
               onmouseover="this.style.background='rgba(122,90,248,0.1)';this.style.color='#7a5af8';"
               onmouseout="this.style.background='transparent';this.style.color='#c0c4de';">
                <span style="font-size:20px;">📊</span> Stock Management
            </a>

            <a href="/suppliers/list" style="
                display:flex;align-items:center;gap:14px;
                padding:14px 25px;
                color:#c0c4de;
                text-decoration:none;
                font-size:14px;
                font-weight:500;"
               onmouseover="this.style.background='rgba(122,90,248,0.1)';this.style.color='#7a5af8';"
               onmouseout="this.style.background='transparent';this.style.color='#c0c4de';">
                <span style="font-size:20px;">🚚</span> Supplier Management
            </a>

            <a href="/orders" style="
                display:flex;align-items:center;gap:14px;
                padding:14px 25px;
                color:#c0c4de;
                text-decoration:none;
                font-size:14px;
                font-weight:500;"
               onmouseover="this.style.background='rgba(122,90,248,0.1)';this.style.color='#7a5af8';"
               onmouseout="this.style.background='transparent';this.style.color='#c0c4de';">
                <span style="font-size:20px;">🧾</span> Purchase Orders
            </a>

        </div>

        <!-- Footer -->
        <div style="padding:20px 25px;border-top:1px solid #2b304a;margin-top:auto;">
            <div style="font-size:11px;color:#787c99;">StockFlow v1.0 &nbsp;|&nbsp; SE1020 Project</div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const panel = document.getElementById('menuPanel');
            const overlay = document.getElementById('menuOverlay');
            const isOpen = panel.style.right === '0px';
            panel.style.right = isOpen ? '-320px' : '0px';
            overlay.style.display = isOpen ? 'none' : 'block';
        }
    </script>

</div>

</body>
</html>
