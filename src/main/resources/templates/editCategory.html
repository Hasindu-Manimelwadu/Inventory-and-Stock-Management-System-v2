<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Edit Category</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="page-content" style="max-width:520px;">
    <div style="margin-bottom:25px;">
        <h1 class="page-title">Edit Category</h1>
        <p class="page-subtitle">Modify existing category details</p>
    </div>
    <div class="sf-card" style="border-top:4px solid var(--accent-blue);">
        <form th:action="@{/categories/edit}" method="post">
            <input type="hidden" name="categoryId" th:value="${category.id}">
            <div class="form-group">
                <label class="sf-label">Category ID</label>
                <input type="text" class="sf-input" th:value="${category.id}" disabled style="opacity:0.5;">
            </div>
            <div class="form-group">
                <label class="sf-label">Category Name</label>
                <input type="text" name="categoryName" class="sf-input" th:value="${category.categoryName}" required>
            </div>
            <div class="form-group">
                <label class="sf-label">Description</label>
                <textarea name="description" class="sf-input" rows="3" required th:text="${category.description}"></textarea>
            </div>
            <div style="display:flex;gap:12px;margin-top:10px;">
                <button type="submit" class="btn-sf btn-purple">Update Category</button>
                <a th:href="@{/categories}" class="btn-sf btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
